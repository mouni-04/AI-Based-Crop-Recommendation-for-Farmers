{% extends 'base1.html' %}
{% load i18n %}
{% block title %}{% trans "Account Recovery | AgriTech" %}{% endblock %}

{% block content %}
<div class="flex items-center justify-center py-24 px-4 agri-bg">
    <div class="max-w-md w-full bg-white/80 backdrop-blur-xl p-10 rounded-[3rem] border border-green-100 shadow-[0_20px_50px_rgba(46,125,50,0.1)] text-center">

        <div class="text-center">
            <div class="w-20 h-20 bg-green-50 border-2 border-green-500 rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-[0_0_15px_rgba(46,125,50,0.1)]">
                <i class="fa-solid fa-leaf-heart text-3xl text-green-700"></i>
            </div>
            <h1 class="text-3xl font-black text-green-900 mb-2 tracking-tight">
                {% trans "Reset" %} <span class="text-green-600">{% trans "Access" %}</span>
            </h1>
            <p class="text-[11px] font-bold text-gray-400 uppercase tracking-[0.2em] mb-8">
                {% trans "Initialize Secure Account Recovery" %}
            </p>
        </div>

        <form method="post" class="space-y-6 text-left">
            {% csrf_token %}
            <div class="space-y-2">
                <label class="text-[10px] font-black uppercase text-green-800 ml-2 tracking-widest">
                    {% trans "Registered Farmer Email" %}
                </label>
                <div class="relative group">
                    <i class="fa-solid fa-at absolute left-5 top-5 text-gray-400 group-focus-within:text-green-600 transition-colors"></i>
                    <input type="email" name="email" required placeholder="name@example.com"
                           class="w-full pl-14 pr-6 py-4 bg-gray-50/50 border border-gray-200 rounded-2xl focus:border-green-500/50 focus:ring-4 focus:ring-green-500/5 outline-none font-semibold text-gray-800 transition-all">
                </div>
            </div>

            <button type="submit" class="btn-glow w-full text-white font-black py-4 rounded-2xl uppercase tracking-[0.3em] text-[11px] mt-4 transition-all active:scale-95">
                <i class="fa-solid fa-paper-plane mr-2"></i> {% trans "Send Recovery Link" %}
            </button>
        </form>

        <div class="mt-8 text-center border-t border-green-50 pt-6">
            <a href="{% url 'accounts:login' %}" class="text-[10px] font-black text-green-700 uppercase tracking-widest hover:underline">
                <i class="fa-solid fa-arrow-left mr-1"></i> {% trans "Return to Login" %}
            </a>
        </div>
    </div>
</div>
{% endblock %}
