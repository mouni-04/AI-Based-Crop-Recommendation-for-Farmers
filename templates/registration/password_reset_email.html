{% load i18n %}
{% autoescape off %}
<html>
<body style="font-family: 'Poppins', sans-serif; background-color: #F1F8E9; padding: 40px;">
    <div style="max-width: 600px; margin: 0 auto; background: #ffffff; padding: 40px; border-radius: 30px; border: 2px solid #A5D6A7;">
        <div style="text-align: center; margin-bottom: 30px;">
            <h2 style="color: #2E7D32; text-transform: uppercase; letter-spacing: 2px;">Agri<span style="color: #66bb6a;">Tech</span></h2>
        </div>
        <p style="color: #5D4037;">{% trans "Hello," %}</p>
        <p style="color: #5D4037;">{% trans "We received a request to reset the password for your AgriTech account." %}</p>
        <div style="text-align: center; margin: 40px 0;">
            <a href="{{ protocol }}://{{ domain }}{% url 'accounts:password_reset_confirm' uidb64=uid token=token %}" 
               style="background-color: #2E7D32; color: #ffffff; padding: 18px 30px; text-decoration: none; border-radius: 15px; font-weight: bold; text-transform: uppercase; font-size: 14px;">
                {% trans "Reset My Password" %}
            </a>
        </div>
        <p style="font-size: 12px; color: #9ca3af;">{% trans "If you did not request this, please ignore this email." %}</p>
    </div>
</body>
</html>
{% endautoescape %}
