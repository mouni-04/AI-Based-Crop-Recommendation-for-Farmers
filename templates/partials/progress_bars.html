{% load i18n %}

<div class="w-full group">
    <div class="flex justify-between mb-2">
        <span class="text-[10px] font-black text-green-900 uppercase tracking-widest group-hover:text-green-600 transition-colors">
            {% translate label %}
        </span>
        <span class="text-[10px] font-black text-green-600">
            {{ val }}%
        </span>
    </div>
    <div class="w-full bg-gray-100 rounded-full h-1.5 overflow-hidden border border-green-50">
        <div class="bg-gradient-to-r from-green-400 to-green-700 h-full rounded-full transition-all duration-1000 ease-out" 
             style="width: {{ val }}%">
        </div>
    </div>
</div>
